name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check
        run: python -m py_compile codex-usage

      - name: Check --help exits cleanly
        run: python codex-usage --help

      - name: Check --json without auth (should fail gracefully)
        run: |
          result=$(python codex-usage --json 2>&1) || true
          echo "$result"
          # Should mention no auth files, not crash
