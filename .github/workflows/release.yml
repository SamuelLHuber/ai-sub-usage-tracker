name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: codex-usage-linux-amd64
            pyinstaller_args: ""
          - os: macos-latest
            artifact: codex-usage-macos-arm64
            pyinstaller_args: ""
          - os: macos-13
            artifact: codex-usage-macos-amd64
            pyinstaller_args: ""
          - os: windows-latest
            artifact: codex-usage-windows-amd64.exe
            pyinstaller_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name ${{ matrix.artifact }} \
            --strip \
            --noupx \
            codex-usage
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect all binaries
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" release/
          done

          # Generate checksums
          cd release
          sha256sum * > checksums.txt || shasum -a 256 * > checksums.txt
          cd ..

          # Create GitHub release
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/*
