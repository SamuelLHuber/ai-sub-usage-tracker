name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_prefix: linux-amd64
          - os: macos-latest
            artifact_prefix: macos-arm64
          - os: windows-latest
            artifact_prefix: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build ai-usage binary
        run: |
          pyinstaller \
            --onefile \
            --name ai-usage-${{ matrix.artifact_prefix }}${{ matrix.os == 'windows-latest' && '.exe' || '' }} \
            --strip \
            --noupx \
            ai-usage
        shell: bash

      - name: Build codex-usage binary (backward compat)
        run: |
          pyinstaller \
            --onefile \
            --name codex-usage-${{ matrix.artifact_prefix }}${{ matrix.os == 'windows-latest' && '.exe' || '' }} \
            --strip \
            --noupx \
            codex-usage
        shell: bash

      - name: Build claude-usage binary
        run: |
          pyinstaller \
            --onefile \
            --name claude-usage-${{ matrix.artifact_prefix }}${{ matrix.os == 'windows-latest' && '.exe' || '' }} \
            --strip \
            --noupx \
            claude-usage
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_prefix }}
          path: dist/*

  release:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release
          find artifacts -type f ! -name '*.txt' | while read f; do
            cp "$f" release/
          done

          ls -la release/

          cd release
          sha256sum * > checksums.txt 2>/dev/null || shasum -a 256 * > checksums.txt
          cd ..

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/*
